  <script>
    // Restore path encoded by 404.html redirect (GitHub Pages SPA routing fix)
    (function() {
      var params = new URLSearchParams(window.location.search);
      var p = params.get('p');
      if (p) {
        var q = params.get('q');
        var hash = window.location.hash;
        var url = window.location.pathname.replace(/\/$/, '') + p + (q ? '?' + q : '') + hash;
        window.history.replaceState(null, null, url);
      }
    })();
  </script>
