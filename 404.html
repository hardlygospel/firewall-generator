<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tony's Firewall Generator</title>
  <script>
    // GitHub Pages SPA routing fix (hash method).
    // Encodes the sub-path as a hash on the root, so the server serves index.html.
    // index.html decodes and restores via history.replaceState before React boots.
    var l = window.location;
    var base = '/firewall-generator';
    var sub = l.pathname.slice(base.length) || '/';
    window.location.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base + '/#' + sub + l.search + l.hash);
  </script>
</head>
<body></body>
</html>
